<header class="masthead">
  <a class="banner" href="{{ '/' | relative_url }}"
     style="background-image: linear-gradient(to bottom, rgba(20,16,34,0) 35%, rgba(20,16,34,.72) 100%), url('{{ '/assets/img/uw-tacoma.jpg' | relative_url }}');">
    <div class="banner-text">
      <span class="banner-title">{{ site.title }}</span>
      <span class="banner-sub">{{ site.tagline }} &middot; {{ site.location }}</span>
    </div>
  </a>
</header>
