# ============================================================
#  SCHEDULE — edit this file to change the program.
#  Each "- " block is one row in the table, top to bottom.
#
#  Fields:
#    time:        required, e.g. "09:00"
#    type:        talk | admin | break | meal   (controls the styling)
#    title:       title of the talk / activity
#    speaker:     (talks only) presenter name
#    affiliation: (talks only) their institution
#    abstract_id: (optional) links the title to an abstract on the
#                 Abstracts page. Must match an {: #id } anchor there.
#
#  To add a talk, copy a block and change the values. Mind the
#  indentation (two spaces) and keep the leading "- ".
# ============================================================

